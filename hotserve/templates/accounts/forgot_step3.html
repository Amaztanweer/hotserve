{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block extra_css %}
<style>
  .auth-wrap { min-height:calc(100vh - 60px); display:flex; align-items:center; justify-content:center; padding:40px 20px; }
  .auth-card { width:100%; max-width:440px; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center; margin-bottom:28px;">
      <div style="font-size:32px;">🔒</div>
      <div style="font-size:22px; font-weight:800; margin-top:8px;">Set New Password</div>
      <div style="font-family:var(--font-mono); font-size:11px; color:var(--green); margin-top:6px;">✅ Identity verified</div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
      </div>
      <button type="submit" class="btn btn-fire btn-full">Reset Password 🔑</button>
    </form>
  </div>
</div>
{% endblock %}
